name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  NEXT_PUBLIC_BASE_PATH: /porschedigital-technology-radar

# Default to read-only at workflow level. Jobs that need to write to Pages
# elevate explicitly. See ADR-0017 for the token-permission policy.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # All third-party and GitHub-owned actions are pinned to commit SHAs
      # to satisfy OpenSSF Scorecard PinnedDependenciesID. The trailing
      # comment records the human-readable tag at pin time. See ADR-0017.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Corepack-managed pnpm. Version comes from `packageManager` in
      # package.json. See ADR-0019.
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:data

      - run: pnpm run build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
