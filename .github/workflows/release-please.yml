name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish current main HEAD to npm (recovery only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Default to read-only at workflow level. Each job that needs to write
# elevates explicitly. See ADR-0017 for the token-permission policy.
permissions:
  contents: read

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      techradar_release_created: ${{ steps.release.outputs['packages/techradar--release_created'] }}
      create_techradar_release_created: ${{ steps.release.outputs['packages/create-techradar--release_created'] }}
    steps:
      # Pinned to commit SHA per OpenSSF Scorecard PinnedDependenciesID.
      # See ADR-0017.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main

  publish:
    needs: release-please
    if: |
      always() && (
        needs.release-please.outputs.techradar_release_created == 'true' ||
        needs.release-please.outputs.create_techradar_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_publish == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1 for `npm publish` with OIDC.
      # Node 22 bundles npm 10.x, so we must upgrade. Installing into a
      # separate prefix sidesteps the in-place self-upgrade race that corrupts
      # the bundled npm and triggers "Cannot find module 'promise-retry'" on
      # the next invocation.
      #
      # We deliberately keep `npm publish` (not `pnpm publish`) for the
      # publish step: pnpm publish forwards to npm under the hood and the
      # OIDC Trusted Publishing flow is documented against npm@>=11.5.1.
      # Installing dependencies still uses pnpm (see ADR-0019).
      #
      # The npm version is pinned (not @latest) to satisfy OpenSSF Scorecard
      # PinnedDependenciesID for npmCommand. Bump deliberately when needed.
      # See ADR-0017.
      - name: Install pinned npm
        run: |
          npm install -g --prefix="$HOME/.npm-global" npm@11.5.1
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - run: npm --version

      - run: pnpm install --frozen-lockfile

      # `--provenance` emits an SLSA build-provenance attestation to npm via the
      # `id-token: write` permission already granted to this job. Lifts OpenSSF
      # Scorecard `Signed-Releases` from -1 to 10. See ADR-0025.
      # Both packages are configured for OIDC Trusted Publishing on npmjs.org —
      # no NPM_TOKEN secret needed.
      - if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.techradar_release_created == 'true' }}
        run: pnpm --filter @porscheofficial/porschedigital-technology-radar publish --no-git-checks --provenance

      - if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.create_techradar_release_created == 'true' }}
        run: pnpm --filter @porscheofficial/create-techradar publish --no-git-checks --provenance
