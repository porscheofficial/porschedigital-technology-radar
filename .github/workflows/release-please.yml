name: Release Please

on:
  push:
    branches: [pdig]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish current pdig HEAD to npm (recovery only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Default to read-only at workflow level. Each job that needs to write
# elevates explicitly. See ADR-0017 for the token-permission policy.
permissions:
  contents: read

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      # Pinned to commit SHA per OpenSSF Scorecard PinnedDependenciesID.
      # See ADR-0017.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: pdig

  publish:
    needs: release-please
    if: |
      always() && (
        needs.release-please.outputs.release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_publish == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1 for `npm publish` with OIDC.
      # Node 22 bundles npm 10.x, so we must upgrade. Installing into a
      # separate prefix sidesteps the in-place self-upgrade race that corrupts
      # the bundled npm and triggers "Cannot find module 'promise-retry'" on
      # the next invocation.
      #
      # We deliberately keep `npm publish` (not `pnpm publish`) for the
      # publish step: pnpm publish forwards to npm under the hood and the
      # OIDC Trusted Publishing flow is documented against npm@>=11.5.1.
      # Installing dependencies still uses pnpm (see ADR-0019).
      #
      # The npm version is pinned (not @latest) to satisfy OpenSSF Scorecard
      # PinnedDependenciesID for npmCommand. Bump deliberately when needed.
      # See ADR-0017.
      - name: Install pinned npm
        run: |
          npm install -g --prefix="$HOME/.npm-global" npm@11.5.1
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - run: npm --version

      - run: pnpm install --frozen-lockfile

      - run: npm publish
