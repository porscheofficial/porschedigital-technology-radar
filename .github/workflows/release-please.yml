name: Release Please

on:
  push:
    branches: [pdig]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish current pdig HEAD to npm (recovery only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: pdig

  publish:
    needs: release-please
    if: |
      always() && (
        needs.release-please.outputs.release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_publish == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1. Node 22 bundles npm 10.x,
      # so we must upgrade. Installing into a separate prefix sidesteps the
      # in-place self-upgrade race that corrupts the bundled npm and triggers
      # "Cannot find module 'promise-retry'" on the next invocation.
      - name: Install npm >= 11.5.1
        run: |
          npm install -g --prefix="$HOME/.npm-global" npm@latest
          echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - run: npm --version

      - run: npm ci

      - run: npm publish
