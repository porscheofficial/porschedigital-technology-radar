name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

# Default to read-only at workflow level. Jobs only elevate when needed.
# See ADR-0017 for the token-permission policy.
permissions:
  contents: read

jobs:
  deps:
    name: OSV-Scanner (npm advisories)
    runs-on: ubuntu-latest
    # `security-events: write` is required to upload SARIF to code-scanning.
    # See ADR-0025 (which amends ADR-0017's table-format rationale).
    permissions:
      contents: read
      security-events: write
    steps:
      # Pinned to commit SHA per OpenSSF Scorecard PinnedDependenciesID.
      # See ADR-0017.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: google/osv-scanner-action/osv-scanner-action@e69cc6c86b31f1e7e23935bbe7031b50e51082de # v2.0.2
        # `continue-on-error: true` keeps the SARIF upload step running even
        # when OSV finds advisories — surfacing findings in the code-scanning
        # UI is the goal; the gate remains red via the upload step's exit code.
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --format=sarif
            --output=osv-results.sarif
      - name: Upload OSV SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

  secrets:
    name: TruffleHog (committed secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      # TruffleHog is pinned to a release SHA (not @main) per Scorecard
      # PinnedDependenciesID. See ADR-0017.
      - uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          extra_args: --results=verified,unknown

  sanitize:
    name: rehype-sanitize wiring + XSS regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @porscheofficial/porschedigital-technology-radar run check:sec:sanitize
      - run: pnpm --filter @porscheofficial/porschedigital-technology-radar exec vitest run scripts/__tests__/sanitize.test.ts
