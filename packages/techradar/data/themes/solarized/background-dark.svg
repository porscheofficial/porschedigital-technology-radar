<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="0.65" cy="0.45" r="0.75">
      <stop offset="0%" stop-color="#073642"/>
      <stop offset="60%" stop-color="#002B36"/>
      <stop offset="100%" stop-color="#001A21"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFE066" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#B58900" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#B58900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunDisc" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="80%" stop-color="#B58900"/>
      <stop offset="100%" stop-color="#8C6900"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#586E75" opacity="0.18"/>
