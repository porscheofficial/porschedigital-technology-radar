  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <g transform="translate(1248, 486)">
    <circle r="640" fill="url(#sunGlow)"/>
    <circle r="540" fill="none" stroke="#268BD2" stroke-width="0.6" opacity="0.22"/>
    <circle r="430" fill="none" stroke="#2AA198" stroke-width="0.6" opacity="0.28"/>
    <circle r="330" fill="none" stroke="#859900" stroke-width="0.6" opacity="0.32"/>
    <circle r="240" fill="none" stroke="#B58900" stroke-width="0.8" opacity="0.4"/>
    <circle r="160" fill="url(#sunDisc)"/>

    <circle cx="-540" cy="0" r="6" fill="#268BD2" opacity="0.6"/>
    <circle cx="304" cy="304" r="5" fill="#2AA198" opacity="0.7"/>
    <circle cx="-233" cy="-233" r="4" fill="#859900" opacity="0.65"/>
    <circle cx="208" cy="-120" r="5" fill="#CB4B16" opacity="0.55"/>
